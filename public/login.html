<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · CCC Resume Studio Lite</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <div class="eyebrow">CCC Resume Studio Lite</div>
        <h1>Welcome back</h1>
        <p class="muted login-copy">Sign in to continue.</p>

        <form id="login-form" class="form-stack login-form">
          <label>
            <span>Username</span>
            <input id="username-input" name="username" type="text" autocomplete="username" required />
          </label>

          <label>
            <span>Password</span>
            <input id="password-input" name="password" type="password" autocomplete="current-password" required />
          </label>

          <button id="login-button" type="submit">Enter workspace</button>
        </form>

        <div id="login-status" class="login-status muted">Private access only.</div>
      </section>
    </main>

    <script src="/login.js" defer></script>
  </body>
</html>
